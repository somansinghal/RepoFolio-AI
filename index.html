<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RepoFolio AI</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<section class="hero">

<h1>RepoFolio AI</h1>

<p>Generate a developer portfolio from GitHub in seconds</p>

</section>

<div class="controls">

<input id="username" placeholder="Enter GitHub username">

<input id="compareUser" placeholder="Compare developer">

<button onclick="generatePortfolio()">Generate</button>

<button onclick="compareDevelopers()">Compare</button>

<button onclick="sharePortfolio()">Share</button>

<button onclick="downloadPortfolio()">Download</button>

</div>

<input id="repoSearch" placeholder="Search repositories" onkeyup="filterRepos()">

<div id="comparison"></div>

<div id="portfolio"></div>

<script src="script.js"></script>

</body>
</html>
