<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RepoFolio AI</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="themes.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body class="dark">

<header>

<h1>RepoFolio AI</h1>
<p>Generate portfolio from GitHub instantly</p>

</header>

<div class="controls">

<input id="username" placeholder="Enter GitHub Username">

<select id="themeSelect">
<option value="dark">Dark Dev</option>
<option value="glass">Glassmorphism</option>
<option value="cyber">Cyberpunk</option>
<option value="minimal">Minimal</option>
<option value="gradient">Gradient Pro</option>
</select>

<button onclick="generatePortfolio()">Generate</button>
<button onclick="downloadPortfolio()">Download Portfolio</button>

</div>

<div id="portfolio"></div>

<script src="script.js"></script>

</body>
</html>
